<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Clone</title>
    <style>
        :root {
            --bg-dark: #0b0e11;
            --card-dark: #1c1f26;
            --click-blue: #007aff;
            --text-gray: #8e8e93;
            --success-green: #2ecc71;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .phone-container {
            width: 100%;
            max-width: 414px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Status Bar */
        .status-bar {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        /* Header */
        .header-nav {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-icon {
            width: 35px;
            height: 35px;
            background: var(--click-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-bar {
            flex-grow: 1;
            background: var(--card-dark);
            border-radius: 10px;
            padding: 8px 12px;
            color: #555;
            font-size: 14px;
        }

        /* Balance */
        .balance-section {
            padding: 20px;
        }

        .main-balance {
            font-size: 32px;
            font-weight: bold;
            margin: 5px 0;
        }

        .humo-pay-btn {
            background: linear-gradient(90deg, #005a92, #0093dd);
            border-radius: 20px;
            padding: 8px 15px;
            float: right;
            margin-top: -25px;
            font-size: 14px;
            font-weight: bold;
        }

        /* Grid Services */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
        }

        .service-item {
            background: var(--card-dark);
            border-radius: 12px;
            padding: 15px 5px;
            text-align: center;
            font-size: 10px;
            cursor: pointer;
        }

        .qr-btn {
            border: 1px solid var(--click-blue);
        }

        /* Bottom Nav */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #16191f;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px;
        }

        .nav-item { text-align: center; font-size: 10px; color: var(--text-gray); }
        .nav-item.active { color: var(--click-blue); }

        /* SCREENS */
        #scanner-screen, #receipt-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
        }

        #scanner-screen { background: black; }

        #receipt-screen { 
            background: var(--bg-dark); 
            padding-top: 60px; 
            text-align: center;
        }

        .receipt-card { 
            background: white; 
            color: black; 
            margin: 20px; 
            padding: 25px; 
            border-radius: 20px; 
            text-align: left;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .receipt-header {
            text-align: center;
            color: var(--click-blue);
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 15px;
        }

        /* Animation */
        @keyframes scanAnim {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div id="main-screen">
        <div class="status-bar">
            <span>09:33</span>
            <span>LTE 🔋 33%</span>
        </div>

        <div class="header-nav">
            <div class="profile-icon">👤</div>
            <div class="search-bar">Поиск</div>
            <span>🔔</span>
        </div>

        <div class="balance-section">
            <div style="color: var(--text-gray); font-size: 14px;">Общий баланс</div>
            <div class="main-balance">4.240.200 <span style="font-weight: normal; font-size: 20px;">сум</span></div>
            <div class="humo-pay-btn">H Humo Pay</div>
        </div>

        <div style="background: var(--click-blue); margin: 0 20px; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold;">+ Добавить карту</div>

        <div class="services-grid">
            <div class="service-item">Click Pass</div>
            <div class="service-item">Click Boom</div>
            <div class="service-item">Карты</div>
            <div class="service-item qr-btn" onclick="startScanner()"><b>QR сканер</b></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active">🏠<br>Главный</div>
            <div class="nav-item">💳<br>Оплата</div>
            <div class="nav-item">⇄<br>Переводы</div>
            <div class="nav-item">📊<br>Отчеты</div>
        </div>
    </div>

    <div id="scanner-screen">
        <video id="video" style="width: 100%; height: 100%; object-fit: cover;" autoplay playsinline></video>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border: 2px solid white; border-radius: 20px; overflow: hidden;">
            <div style="width: 100%; height: 3px; background: var(--click-blue); position: absolute; animation: scanAnim 2s infinite; box-shadow: 0 0 15px var(--click-blue);"></div>
        </div>
    </div>

    <div id="receipt-screen">
        <div style="width: 80px; height: 80px; border: 4px solid var(--success-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: var(--success-green); font-size: 40px; font-weight: bold;">✓</div>
        <h2 style="margin-bottom: 30px;">Оплачено!</h2>
        
        <div class="receipt-card">
            <div class="receipt-header">Click</div>
            <div class="detail-row">
                <span style="color: #888;">Статус</span>
                <span style="color: var(--success-green); font-weight: bold;">Успешно</span>
            </div>
            <div class="detail-row">
                <span style="color: #888;">Сумма</span>
                <span style="font-weight: bold;">1 700 сум</span>
            </div>
            <div class="detail-row">
                <span style="color: #888;">Дата</span>
                <span id="res-date" style="font-weight: bold;"></span>
            </div>
            <div class="detail-row">
                <span style="color: #888;">Время</span>
                <span id="res-time" style="font-weight: bold;"></span>
            </div>
        </div>
        
        <button onclick="location.reload()" style="background: var(--card-dark); color: white; border: none; padding: 15px 40px; border-radius: 12px; cursor: pointer; font-weight: bold;">Закрыть</button>
    </div>
</div>

<script>
    async function startScanner() {
        const scanner = document.getElementById('scanner-screen');
        scanner.style.display = 'block';
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = stream;
            setTimeout(() => {
                stream.getTracks().forEach(t => t.stop());
                showReceipt();
            }, 2500);
        } catch (e) {
            setTimeout(showReceipt, 2500);
        }
    }

    function showReceipt() {
        document.getElementById('scanner-screen').style.display = 'none';
        document.getElementById('receipt-screen').style.display = 'block';
        const now = new Date();
        document.getElementById('res-date').innerText = now.toLocaleDateString('ru-RU');
        document.getElementById('res-time').innerText = now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
    }
</script>
</body>
</html>
